<!-- @format -->

<!doctype html>
<html lang="en" data-bs-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Logger</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous" />
  </head>
  <body>
    
      {% csrf_token %}
    <a href="/logoutpage/">Logout</a>
    <table class="table container-sm w-50 border border-2 mt-4">
      <thead>
        <tr ">
          <th class="border border-2" scope="col">Sr No</th>
          <th class="border border-2" scope="col">First Name</th>
          <th class="border border-2" scope="col">Last Name</th>
          <th class="border border-2" scope="col">Username</th>
          <th class="border border-2" scope="col">Age</th>
          <th class="border border-2" scope="col">Action</th>
        </tr>
      </thead>
      <tbody>
        {% for person in data %}
        <tr >
          <th class="border border-2" scope="row" class="border border-2">{{person.id}}</th>
          <td class="border border-2" >{{person.first_name}}</td>
          <td class="border border-2" >{{person.last_name}}</td>
          <td class="border border-2" >{{person.username}}</td>
          <td class="border border-2" >{{person.age}}</td>
          <td class="border border-2" >
            <a href="{% url 'delete-person' person.username %}">Delete</a>  
          </td>
        </tr>
        {% endfor %}
      </tbody>
    </table>

    <div class="container w-50 d-flex justify-content-center">
      <a href="/register">
        <button type="button" class="btn btn-primary">Add new user</button>
              </a>
    </div>

    

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"></script>
  </body>
</html>
